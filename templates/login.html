<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus · Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: rgba(255,255,255,0.06);
    --accent: #7c3aed;
    --accent2: #06d6a0;
    --text: #f0f0f5;
    --muted: #666680;
    --danger: #ef4444;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Space Grotesk', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  /* Animated background */
  .bg-orbs {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
  }
  .orb {
    position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.15;
    animation: float 8s ease-in-out infinite;
  }
  .orb-1 { width: 500px; height: 500px; background: #7c3aed; top: -10%; left: -10%; animation-delay: 0s; }
  .orb-2 { width: 400px; height: 400px; background: #06d6a0; bottom: -10%; right: -5%; animation-delay: -3s; }
  .orb-3 { width: 300px; height: 300px; background: #ec4899; top: 40%; left: 60%; animation-delay: -5s; }
  @keyframes float {
    0%, 100% { transform: translate(0,0) scale(1); }
    33% { transform: translate(30px, -30px) scale(1.05); }
    66% { transform: translate(-20px, 20px) scale(0.95); }
  }
  /* Grid pattern */
  .grid-bg {
    position: fixed; inset: 0; z-index: 0;
    background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 50px 50px;
  }
  .card {
    position: relative; z-index: 1;
    background: rgba(17,17,24,0.8);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 48px 40px;
    width: 420px;
    backdrop-filter: blur(20px);
    box-shadow: 0 32px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.04);
    animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(40px) scale(0.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  .logo {
    font-family: 'Syne', sans-serif;
    font-size: 32px; font-weight: 800;
    background: linear-gradient(135deg, #7c3aed, #06d6a0);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    text-align: center; margin-bottom: 8px;
    letter-spacing: -1px;
  }
  .tagline {
    text-align: center; color: var(--muted); font-size: 13px;
    margin-bottom: 36px; letter-spacing: 0.5px;
  }
  /* Tabs */
  .tabs { display: flex; gap: 4px; background: rgba(255,255,255,0.04); border-radius: 12px; padding: 4px; margin-bottom: 28px; }
  .tab-btn {
    flex: 1; padding: 10px; border: none; background: transparent;
    color: var(--muted); font-family: 'Space Grotesk', sans-serif;
    font-size: 14px; font-weight: 500; border-radius: 8px; cursor: pointer;
    transition: all 0.2s;
  }
  .tab-btn.active { background: var(--accent); color: white; box-shadow: 0 4px 12px rgba(124,58,237,0.3); }

  .tab-content { display: none; }
  .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

  .form-group { margin-bottom: 16px; }
  label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.8px; }
  input[type=text], input[type=password] {
    width: 100%; padding: 14px 16px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 12px; color: var(--text);
    font-family: 'Space Grotesk', sans-serif; font-size: 15px;
    outline: none; transition: all 0.2s;
  }
  input:focus { border-color: var(--accent); background: rgba(124,58,237,0.05); box-shadow: 0 0 0 3px rgba(124,58,237,0.15); }
  .btn {
    width: 100%; padding: 14px;
    background: linear-gradient(135deg, var(--accent), #5b21b6);
    border: none; border-radius: 12px; color: white;
    font-family: 'Space Grotesk', sans-serif; font-size: 15px; font-weight: 600;
    cursor: pointer; transition: all 0.2s; margin-top: 8px;
    position: relative; overflow: hidden;
  }
  .btn:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(124,58,237,0.4); }
  .btn:active { transform: translateY(0); }
  .btn::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(rgba(255,255,255,0.1), transparent);
  }
  .flash-msg {
    background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3);
    color: #fca5a5; padding: 12px; border-radius: 10px; font-size: 13px;
    margin-bottom: 16px; text-align: center;
  }
  .enc-badge {
    display: flex; align-items: center; gap: 8px; justify-content: center;
    margin-top: 20px; color: var(--muted); font-size: 12px;
  }
  .enc-dot { width: 6px; height: 6px; background: var(--accent2); border-radius: 50%; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
</style>
</head>
<body>
<div class="bg-orbs">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>
<div class="grid-bg"></div>

<div class="card">
  <div class="logo">NEXUS</div>
  <div class="tagline">End-to-end encrypted · Private messaging</div>

  {% with messages = get_flashed_messages() %}
    {% if messages %}
      <div class="flash-msg">{{ messages[0] }}</div>
    {% endif %}
  {% endwith %}

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('login')">Sign In</button>
    <button class="tab-btn" onclick="switchTab('register')">Register</button>
  </div>

  <div id="tab-login" class="tab-content active">
    <form method="POST">
      <input type="hidden" name="action" value="login">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" placeholder="your_username" required autocomplete="off">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn">Sign In →</button>
    </form>
  </div>

  <div id="tab-register" class="tab-content">
    <form method="POST">
      <input type="hidden" name="action" value="register">
      <div class="form-group">
        <label>Choose Username</label>
        <input type="text" name="username" placeholder="your_username" required autocomplete="off">
      </div>
      <div class="form-group">
        <label>Set Password</label>
        <input type="password" name="password" placeholder="min 6 characters" required minlength="6">
      </div>
      <button type="submit" class="btn">Create Account →</button>
    </form>
  </div>

  <div class="enc-badge">
    <div class="enc-dot"></div>
    Each conversation uses a unique encryption key
  </div>
</div>

<script>
function switchTab(tab) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  event.target.classList.add('active');
}
</script>
</body>
</html>
